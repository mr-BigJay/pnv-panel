# /etc/nginx/sites-available/panel.ticketin.ir
#
# اگر SSL هنوز ندارید، اول فایل http را استفاده کنید:
#   curl .../nginx-panel.ticketin.ir.http.conf -o /etc/nginx/sites-available/panel.ticketin.ir
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d panel.ticketin.ir
#
# بعد از certbot می‌توانید این نسخه SSL را بگذارید (یا certbot خودش اضافه می‌کند)

# ریدایرکت HTTP به HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name panel.ticketin.ir;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name panel.ticketin.ir;

    root /var/www/html;
    index index.php index.html;

    # SSL — اگر certbot دارید این مسیرها درست است
    ssl_certificate     /etc/letsencrypt/live/panel.ticketin.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.ticketin.ir/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Chatwoot — مسنجر پشتیبانی
    location /chat/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # مسدود کردن دسترسی مستقیم به دیتابیس JSON
    location ^~ /db/ {
        deny all;
        return 404;
    }

    # پنل ادمین
    location ^~ /admin/ {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff|woff2)$ {
        expires 7d;
        access_log off;
    }
}
