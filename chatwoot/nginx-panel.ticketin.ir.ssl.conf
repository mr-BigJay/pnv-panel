# Nginx for panel.ticketin.ir + Chatwoot at /chat/
# SSL paths: /root/cert/panel.ticketin.ir/fullchain.pem + privkey.pem

server {
    listen 80;
    listen [::]:80;
    server_name panel.ticketin.ir;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name panel.ticketin.ir;

    root /var/www/html;
    index index.php index.html;

    ssl_certificate     /root/cert/panel.ticketin.ir/fullchain.pem;
    ssl_certificate_key /root/cert/panel.ticketin.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20M;

    # Chatwoot — همه مسیرهای زیر /chat/
    location /chat {
        return 301 https://$host/chat/;
    }

    location /chat/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /chat;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # اگر Chatwoot بدون prefix مسیر بسازد (پشتیبان)
    location ^~ /packs/ {
        proxy_pass http://127.0.0.1:3000/packs/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /vite/ {
        proxy_pass http://127.0.0.1:3000/vite/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /cable {
        proxy_pass http://127.0.0.1:3000/cable;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /db/ {
        deny all;
        return 404;
    }

    location ^~ /admin/ {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
