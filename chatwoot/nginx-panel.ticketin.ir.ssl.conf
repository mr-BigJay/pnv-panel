# Nginx for panel.ticketin.ir + Chatwoot + پنل ادمین bigjay_controller
# SSL: /root/cert/panel.ticketin.ir/fullchain.pem + privkey.pem
#
# Chatwoot .env:
#   FRONTEND_URL=https://panel.ticketin.ir

server {
    listen 80;
    listen [::]:80;
    server_name panel.ticketin.ir;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name panel.ticketin.ir;

    root /var/www/html;
    index index.php index.html;

    ssl_certificate     /root/cert/panel.ticketin.ir/fullchain.pem;
    ssl_certificate_key /root/cert/panel.ticketin.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20M;
    underscores_in_headers on;

    location = /admin.php {
        return 301 /bigjay_controller/;
    }

    location ^~ /admin/ {
        deny all;
        return 404;
    }

    location = /bigjay_controller {
        return 301 /bigjay_controller/;
    }

    location = /chat {
        return 301 https://$host/app/;
    }

    location = /chat/ {
        return 301 https://$host/app/;
    }

    # --- Chatwoot (127.0.0.1:3000) ---
    location ^~ /app/ {
        proxy_pass http://127.0.0.1:3000/app/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location ^~ /auth/ {
        proxy_pass http://127.0.0.1:3000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /public/ {
        proxy_pass http://127.0.0.1:3000/public/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /rails/ {
        proxy_pass http://127.0.0.1:3000/rails/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /packs/ {
        proxy_pass http://127.0.0.1:3000/packs/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /vite/ {
        proxy_pass http://127.0.0.1:3000/vite/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /cable {
        proxy_pass http://127.0.0.1:3000/cable;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /db/ {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
